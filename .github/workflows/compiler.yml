# .github/workflows/ci.yml

name: Android CI & Deployment

on:
  push:
    branches: [ main ]
    # Triggers from your 'Compiler' workflow for efficiency
    paths:
      - '.github/workflows/**'
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'settings.gradle'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      skip-tests:
        description: 'Skip running unit tests'
        required: false
        default: 'false'
        type: boolean

jobs:
  # This job is from your 'Compiler' workflow to notify at the start
  notifyTelegramStart:
    name: Notify Telegram of Start
    runs-on: ${{ vars.IS_USING_HOSTED_RUNNERS == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Send a message to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
        run: python ./.github/workflows/notify_telegram.py
        continue-on-error: true

  # This is the main build job, combining the best of both workflows
  build:
    name: Build Release APK
    # This job must run after the initial notification
    needs: notifyTelegramStart
    runs-on: ${{ vars.IS_USING_HOSTED_RUNNERS == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 30
    outputs:
      short_sha: ${{ steps.set_sha.outputs.short_sha }}
      apk_path: ${{ steps.find-apk.outputs.apk_path }}
      apk_name: ${{ steps.find-apk.outputs.apk_name }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Fetch all history for git log commands in later jobs
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        # Explicitly install the SDK platform your project needs. Adjust if necessary.
        packages: 'platforms;android-34'

    # THIS IS THE FIX: Create the physical google-services.json file
    - name: Create google-services.json
      if: secrets.GOOGLE_SERVICES_JSON != ''
      env:
        GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        echo "Creating app/google-services.json from secret..."
        # Using printf is safer for multi-line secrets
        printf "%s\n" "$GOOGLE_SERVICES" > app/google-services.json
        
        echo "Verifying file was created:"
        if [ -s "app/google-services.json" ]; then
          echo "File created successfully."
        else
          echo "::error::google-services.json was not created or is empty. Check your GOOGLE_SERVICES_JSON secret."
          exit 1
        fi

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Run Gradle Build
      id: gradle-build
      env:
        # Pass secrets needed for the build process
        SKETCHUB_API_KEY: ${{ secrets.SKETCHUB_API_KEY }}
      run: |
        TEST_FLAG=""
        if [[ "${{ github.event.inputs.skip-tests }}" == "true" ]]; then
          TEST_FLAG="-x test"
          echo "Skipping tests."
        fi
        
        echo "Starting build for type: release"
        
        # We hardcode 'Release' as this CI is for deployment
        ./gradlew clean assembleRelease \
          $TEST_FLAG \
          --no-daemon \
          --stacktrace \
          --warning-mode all

    - name: Set short SHA
      id: set_sha
      run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Find and Rename APK
      id: find-apk
      run: |
        # Find the generated APK
        SOURCE_APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)
        if [[ -z "$SOURCE_APK" ]]; then
          echo "::error::APK not found after build. Please check the build logs."
          exit 1
        fi
        echo "Found source APK at: $SOURCE_APK"

        # Create a new name and rename the file
        APK_NAME="app-release-${{ steps.set_sha.outputs.short_sha }}.apk"
        mv "$SOURCE_APK" "$APK_NAME"
        echo "Renamed APK to: $APK_NAME"

        # Output the new path and name for subsequent jobs
        echo "apk_path=$APK_NAME" >> $GITHUB_OUTPUT
        echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.find-apk.outputs.apk_name }}
        path: ${{ steps.find-apk.outputs.apk_path }}
        retention-days: 7

    - name: Upload Build Reports on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: |
          **/build/reports/
        retention-days: 3

  # This job sends the built APK to Telegram
  sendToTelegram:
    name: Send APK to Telegram
    runs-on: ${{ vars.IS_USING_HOSTED_RUNNERS == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.apk_name }}

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install telethon

      - name: Get Git Commit Info
        run: |
          echo "COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')" >> $GITHUB_ENV
          echo "COMMIT_MESSAGE=$(git log -1 --pretty=format:'%s')" >> $GITHUB_ENV

      - name: Restore Telegram session cache
        uses: actions/cache@v4
        id: telegram_session_cache
        with:
          path: bot_session.session
          key: telegram-session-${{ runner.os }}-bot_session

      - name: Send APK to Telegram
        env:
          API_ID: ${{ secrets.TELEGRAM_API_ID }}
          API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          APK_PATH: ${{ needs.build.outputs.apk_path }}
        run: python ./.github/workflows/deploy_artifacts.py
        continue-on-error: true

  # This job is from your 'Compiler' workflow and runs in parallel to sending the APK
  updateAppData:
    name: Update App Data
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Update App Script
        run: python .github/workflows/update_app_data.py

      - name: Commit and Push Changes
        env:
          GH_ABOUT_APP_WORKFLOW_TOKEN: ${{ secrets.GH_ABOUT_APP_WORKFLOW_TOKEN }}
        run: |
          git checkout host
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add about.json
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat: Update app about screen data"
            git push
          fi
        continue-on-error: true